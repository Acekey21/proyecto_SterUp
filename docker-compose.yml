version: '3.8'  
services:  
  php-apache:  
    image: php:7.4-apache  
    ports:  
      - '80:80'  
    networks:  
      - app-network  
    volumes:  
      - .:/var/www/html  

  mysql:  
    image: mysql:5.7  
    environment:  
      MYSQL_ROOT_PASSWORD: example  
      MYSQL_DATABASE: mydb  
      MYSQL_USER: user  
      MYSQL_PASSWORD: password  
    ports:  
      - '3306:3306'  
    networks:  
      - app-network  

networks:  
  app-network:  
    driver: bridge  
